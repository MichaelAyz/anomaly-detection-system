
volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:

services:
  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    user: "0:0"

  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    expose:
      - "80"
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=100.26.113.199
    restart: unless-stopped
